name: Giftledger
options:
  bundleIdPrefix: com.shimondeitel.giftledger
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Giftledger:
    type: application
    platform: iOS
    sources:
      - path: Giftledger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.giftledger
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Giftledger/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  GiftledgerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GiftledgerTests
      - path: Giftledger.storekit
    dependencies:
      - target: Giftledger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.giftledger.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  GiftledgerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: GiftledgerUITests
    dependencies:
      - target: Giftledger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.giftledger.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Giftledger:
    build:
      targets:
        Giftledger: all
        GiftledgerTests: [test]
        GiftledgerUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Giftledger.storekit
    test:
      config: Debug
      storeKitConfiguration: Giftledger.storekit
      targets:
        - GiftledgerTests
        - GiftledgerUITests
    archive:
      config: Release
